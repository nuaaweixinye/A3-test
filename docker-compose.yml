services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learning-multiagent
    ports:
      - "3000:3000"
    environment:
      SPARK_APP_ID: ${SPARK_APP_ID}
      SPARK_API_KEY: ${SPARK_API_KEY}
      SPARK_API_SECRET: ${SPARK_API_SECRET}
      SPARK_WS_URL: ${SPARK_WS_URL:-wss://spark-api.xf-yun.com/x2}
      SPARK_DOMAIN: ${SPARK_DOMAIN:-spark-x}
      SPARK_BASE_URL: ${SPARK_BASE_URL:-https://spark-api-open.xf-yun.com/v1}
      SPARK_DEFAULT_MODEL: ${SPARK_DEFAULT_MODEL:-4.0Ultra}
      MODEL_ROUTES: ${MODEL_ROUTES:-}
      FFMPEG_PATH: ${FFMPEG_PATH:-ffmpeg}
    restart: unless-stopped
